spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aidigest}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  thymeleaf:
    cache: ${THYMELEAF_CACHE:false}

app:
  site-url: ${APP_SITE_URL:http://localhost:8080}
  site-name: AI Daily Digest
  site-description: 每日 AI/LLM 技術文章中文摘要，自動爬取並以 Gemini 產生繁體中文摘要。
  indexnow:
    enabled: ${INDEXNOW_ENABLED:false}
    key: ${INDEXNOW_KEY:}
  groq:
    api-key: ${GROQ_API_KEY:}
    model: llama-3.3-70b-versatile
    url: https://api.groq.com/openai/v1/chat/completions
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}
    url: https://api.telegram.org
  rss:
    sources:
      - https://hnrss.org/newest?q=AI+LLM+claude+chatgpt&count=20
      - https://dev.to/feed/tag/ai
      - https://www.anthropic.com/rss.xml
      - https://openai.com/blog/rss.xml
      - https://karpathy.github.io/feed.xml
      - https://simonwillison.net/atom/everything/
      - https://addyosmani.com/rss.xml
      - https://mitchellh.com/feed.xml
      - https://world.hey.com/dhh/feed.atom
  keywords:
    - claude
    - llm
    - gpt
    - gemini
    - ai agent
    - rag
    - fine-tune
    - vector
    - embedding
    - mcp

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aidigest}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  thymeleaf:
    cache: ${THYMELEAF_CACHE:false}

app:
  site-url: ${APP_SITE_URL:http://localhost:8080}
  site-name: AI Daily Digest
  site-description: 每日 AI/LLM 技術文章中文摘要，自動爬取並以 Gemini 產生繁體中文摘要。
  indexnow:
    enabled: ${INDEXNOW_ENABLED:false}
    key: ${INDEXNOW_KEY:}
  author-tracker:
    enabled: ${AUTHOR_TRACKER_ENABLED:false}
    cse-api-key: ${GOOGLE_CSE_API_KEY:}
    cse-id: ${GOOGLE_CSE_ID:}
    lookback-hours: 48
    handles:
      - { handle: karpathy, name: "Andrej Karpathy", title: "OpenAI 共同創辦人、LLM 教育者" }

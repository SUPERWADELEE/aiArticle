<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">

    <title th:text="${pageTitle}">AI Daily Digest</title>
    <meta name="description" th:content="${pageDescription}">

    <link rel="canonical" th:href="${siteUrl + canonicalPath}">

    <meta property="og:site_name" th:content="${siteName}">
    <meta property="og:type" th:content="${ogType ?: 'website'}">
    <meta property="og:title" th:content="${pageTitle}">
    <meta property="og:description" th:content="${pageDescription}">
    <meta property="og:url" th:content="${siteUrl + canonicalPath}">
    <meta property="og:locale" content="zh_TW">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" th:content="${pageTitle}">
    <meta name="twitter:description" th:content="${pageDescription}">

    <link rel="alternate" type="application/atom+xml" th:title="${siteName}"
          th:href="${siteUrl + '/feed.xml'}">

    <script th:if="${jsonLd}" type="application/ld+json" th:utext="${jsonLd}"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
</body>
</html>

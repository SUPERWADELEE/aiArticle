<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header" class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
        <a href="/" class="text-xl font-bold text-slate-900 hover:text-indigo-600 transition">
            <span th:text="${siteName}">AI Daily Digest</span>
        </a>
        <nav aria-label="主導覽">
            <ul class="flex gap-4 text-sm text-slate-700">
                <li><a href="/" class="hover:text-indigo-600">首頁</a></li>
                <li th:each="src : ${sources}">
                    <a th:href="@{/sources/{src}(src=${src})}"
                       th:text="${@sourceNameMapper.display(src)}"
                       class="hover:text-indigo-600">Source</a>
                </li>
            </ul>
        </nav>
    </div>
</header>
</body>
</html>

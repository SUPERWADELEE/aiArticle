services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: aidigest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: aidigest
      DB_USER: postgres
      DB_PASSWORD: postgres
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_CSE_API_KEY: ${GOOGLE_CSE_API_KEY:-}
      GOOGLE_CSE_ID: ${GOOGLE_CSE_ID:-}
      AUTHOR_TRACKER_ENABLED: ${AUTHOR_TRACKER_ENABLED:-false}
      APP_SITE_URL: ${APP_SITE_URL:-https://ai-article.elitecombat.dev}
    restart: unless-stopped

volumes:
  pgdata:
